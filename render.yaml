services:
  - type: web
    name: illustconverter
    runtime: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NOVELAI_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@illustconverter.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
    disk:
      name: data
      mountPath: /opt/render/project/src/server
      sizeGB: 1
