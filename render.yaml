services:
  - type: web
    name: illustconverter
    runtime: node
    plan: starter
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NOVELAI_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@illustconverter.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEMO_EMAIL
        value: demo.user@illustconverter.com
      - key: DEMO_PASSWORD
        value: user123456
      - key: DEMO_USERNAME
        value: Demo User
      - key: DEMO_CREDITS
        value: 20
      - key: NODE_ENV
        value: production
    disk:
      name: data
      mountPath: /opt/render/project/src/server
      sizeGB: 1
